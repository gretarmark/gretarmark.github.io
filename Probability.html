    <h1>Probability</h1>

    <h2> <b>Basic Probability</b> </h2>

    <p>Probability is a mathematical way of describing the likelihood of an event happening. For any event A, the probability is: <br>
      <span class="math display">$$\begin{aligned}
          0 \leq P(A) \leq 1
          \end{aligned}$$</span>
     </p>
